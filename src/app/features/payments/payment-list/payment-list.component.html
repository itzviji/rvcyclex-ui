<p-toast></p-toast>

<p-sidebar [(visible)]="filterVisible" position="right" [style]="{width: '320px'}" header="Filter Payments">
  <div class="filter-group">
    <label class="filter-label">Claim #</label>
    <input pInputText [(ngModel)]="filterClaimNumber" placeholder="Search claim number" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Patient</label>
    <input pInputText [(ngModel)]="filterPatient" placeholder="Search by patient" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Payer</label>
    <input pInputText [(ngModel)]="filterPayer" placeholder="Search by payer" class="w-full" />
  </div>
  <div class="filter-actions">
    <p-button label="Apply" icon="pi pi-check" size="small" (onClick)="applyFilters()"></p-button>
    <p-button label="Clear" icon="pi pi-times" size="small" [outlined]="true" (onClick)="clearFilters()"></p-button>
  </div>
</p-sidebar>

<div class="page-header">
  <h2>Payments</h2>
  <div class="header-actions">
    <p-button icon="pi pi-download" label="Export" [outlined]="true" size="small" (onClick)="exportCSV()"></p-button>
  </div>
</div>

<div class="table-card">
  <p-table #dt [value]="approvedClaims" [loading]="loading" [paginator]="true" [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['claimNumber', 'patientName', 'payerName']"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    dataKey="claimId" [rowHover]="true" styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </span>
          <p-button icon="pi pi-filter" [outlined]="true" size="small" [badge]="activeFilterCount > 0 ? '' + activeFilterCount : undefined" badgeClass="p-badge-danger" pTooltip="Filters" (onClick)="filterVisible = true"></p-button>
        </div>
        <span class="record-count">{{ approvedClaims.length }} ready for payment</span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="claimId" style="width: 60px">ID <p-sortIcon field="claimId"></p-sortIcon></th>
        <th pSortableColumn="claimNumber">Claim # <p-sortIcon field="claimNumber"></p-sortIcon></th>
        <th pSortableColumn="patientName">Patient <p-sortIcon field="patientName"></p-sortIcon></th>
        <th pSortableColumn="payerName">Payer <p-sortIcon field="payerName"></p-sortIcon></th>
        <th pSortableColumn="totalBilledAmount">Billed <p-sortIcon field="totalBilledAmount"></p-sortIcon></th>
        <th pSortableColumn="approvedAmount">Approved <p-sortIcon field="approvedAmount"></p-sortIcon></th>
        <th style="width: 110px">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-c>
      <tr>
        <td>{{ c.claimId }}</td>
        <td class="font-semibold">{{ c.claimNumber }}</td>
        <td>{{ c.patientName }}</td>
        <td>{{ c.payerName }}</td>
        <td>{{ c.totalBilledAmount | currency }}</td>
        <td class="font-semibold">{{ c.approvedAmount | currency }}</td>
        <td>
          <p-button icon="pi pi-credit-card" label="Post" size="small" (onClick)="openPaymentForm(c)"></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7" class="text-center p-4">No approved claims awaiting payment.</td></tr>
    </ng-template>
  </p-table>
</div>
