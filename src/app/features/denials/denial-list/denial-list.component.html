<p-toast></p-toast>

<p-sidebar [(visible)]="filterVisible" position="right" [style]="{width: '320px'}" header="Filter Denials">
  <div class="filter-group">
    <label class="filter-label">Claim #</label>
    <input pInputText [(ngModel)]="filterClaimNumber" placeholder="Search claim number" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Patient</label>
    <input pInputText [(ngModel)]="filterPatient" placeholder="Search by patient" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Reason Code</label>
    <input pInputText [(ngModel)]="filterReason" placeholder="Search reason code" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Category</label>
    <input pInputText [(ngModel)]="filterCategory" placeholder="Search category" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Status</label>
    <p-dropdown [options]="statusOptions" [(ngModel)]="filterStatus" placeholder="All" [showClear]="true" styleClass="w-full"></p-dropdown>
  </div>
  <div class="filter-actions">
    <p-button label="Apply" icon="pi pi-check" size="small" (onClick)="applyFilters()"></p-button>
    <p-button label="Clear" icon="pi pi-times" size="small" [outlined]="true" (onClick)="clearFilters()"></p-button>
  </div>
</p-sidebar>

<div class="page-header">
  <h2>Denials</h2>
  <div class="header-actions">
    <p-button icon="pi pi-download" label="Export" [outlined]="true" size="small" (onClick)="exportCSV()"></p-button>
  </div>
</div>

<div class="table-card">
  <p-table #dt [value]="denials" [loading]="loading" [paginator]="true" [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['claimNumber', 'patientName', 'reasonCode', 'category', 'status']"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    dataKey="denialId" [rowHover]="true" styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </span>
          <p-button icon="pi pi-filter" [outlined]="true" size="small" [badge]="activeFilterCount > 0 ? '' + activeFilterCount : undefined" badgeClass="p-badge-danger" pTooltip="Filters" (onClick)="filterVisible = true"></p-button>
        </div>
        <span class="record-count">{{ denials.length }} records</span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="denialId" style="width: 60px">ID <p-sortIcon field="denialId"></p-sortIcon></th>
        <th pSortableColumn="claimNumber">Claim # <p-sortIcon field="claimNumber"></p-sortIcon></th>
        <th pSortableColumn="patientName">Patient <p-sortIcon field="patientName"></p-sortIcon></th>
        <th pSortableColumn="denialDate">Date <p-sortIcon field="denialDate"></p-sortIcon></th>
        <th pSortableColumn="reasonCode">Reason <p-sortIcon field="reasonCode"></p-sortIcon></th>
        <th pSortableColumn="category">Category <p-sortIcon field="category"></p-sortIcon></th>
        <th pSortableColumn="status">Status <p-sortIcon field="status"></p-sortIcon></th>
        <th style="width: 90px">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-d>
      <tr>
        <td>{{ d.denialId }}</td>
        <td class="font-semibold">{{ d.claimNumber }}</td>
        <td>{{ d.patientName }}</td>
        <td>{{ d.denialDate }}</td>
        <td>{{ d.reasonCode || '-' }}</td>
        <td>{{ d.category || '-' }}</td>
        <td><p-tag [value]="d.status" [severity]="getStatusSeverity(d.status)"></p-tag></td>
        <td>
          <div class="action-btns">
            @if (d.status === 'OPEN') {
              <p-button icon="pi pi-check-circle" [rounded]="true" [text]="true" size="small" severity="success" pTooltip="Verify" (onClick)="openVerify(d)"></p-button>
            }
            <p-button icon="pi pi-file-pdf" [rounded]="true" [text]="true" size="small" pTooltip="Report" (onClick)="downloadReport(d)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="8" class="text-center p-4">No denials found.</td></tr>
    </ng-template>
  </p-table>
</div>
