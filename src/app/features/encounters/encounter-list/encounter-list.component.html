<p-sidebar [(visible)]="filterVisible" position="right" [style]="{width: '320px'}" header="Filter Encounters">
  <div class="filter-group">
    <label class="filter-label">Patient</label>
    <input pInputText [(ngModel)]="filterPatient" placeholder="Search by patient" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Doctor</label>
    <input pInputText [(ngModel)]="filterDoctor" placeholder="Search by doctor" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Charged</label>
    <p-dropdown [options]="chargedOptions" [(ngModel)]="filterCharged" placeholder="All" [showClear]="true" styleClass="w-full"></p-dropdown>
  </div>
  <div class="filter-actions">
    <p-button label="Apply" icon="pi pi-check" size="small" (onClick)="applyFilters()"></p-button>
    <p-button label="Clear" icon="pi pi-times" size="small" [outlined]="true" (onClick)="clearFilters()"></p-button>
  </div>
</p-sidebar>

<div class="page-header">
  <h2>Encounters</h2>
  <div class="header-actions">
    <p-button icon="pi pi-download" label="Export" [outlined]="true" size="small" (onClick)="exportCSV()"></p-button>
    <p-button icon="pi pi-plus" label="New Encounter" size="small" (onClick)="openForm()"></p-button>
  </div>
</div>

<div class="table-card">
  <p-table #dt [value]="encounters" [loading]="loading" [paginator]="true" [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['patientName', 'doctorName', 'diagnosisNotes']"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    dataKey="encounterId" [rowHover]="true" styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </span>
          <p-button icon="pi pi-filter" [outlined]="true" size="small" [badge]="activeFilterCount > 0 ? '' + activeFilterCount : undefined" badgeClass="p-badge-danger" pTooltip="Filters" (onClick)="filterVisible = true"></p-button>
        </div>
        <span class="record-count">{{ encounters.length }} records</span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="encounterId" style="width: 70px">ID <p-sortIcon field="encounterId"></p-sortIcon></th>
        <th pSortableColumn="patientName">Patient <p-sortIcon field="patientName"></p-sortIcon></th>
        <th pSortableColumn="doctorName">Doctor <p-sortIcon field="doctorName"></p-sortIcon></th>
        <th pSortableColumn="serviceDate">Service Date <p-sortIcon field="serviceDate"></p-sortIcon></th>
        <th>Diagnosis Notes</th>
        <th pSortableColumn="charged" style="width: 90px">Charged <p-sortIcon field="charged"></p-sortIcon></th>
        <th pSortableColumn="createdAt">Created <p-sortIcon field="createdAt"></p-sortIcon></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-e>
      <tr>
        <td>{{ e.encounterId }}</td>
        <td class="font-semibold">{{ e.patientName }}</td>
        <td>{{ e.doctorName }}</td>
        <td>{{ e.serviceDate }}</td>
        <td class="notes-cell">{{ e.diagnosisNotes }}</td>
        <td><p-tag [value]="e.charged ? 'Yes' : 'No'" [severity]="e.charged ? 'success' : 'warning'"></p-tag></td>
        <td>{{ e.createdAt | date:'short' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7" class="text-center p-4">No encounters found.</td></tr>
    </ng-template>
  </p-table>
</div>
