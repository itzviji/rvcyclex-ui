<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-sidebar [(visible)]="filterVisible" position="right" [style]="{width: '320px'}" header="Filter Users">
  <div class="filter-group">
    <label class="filter-label">Name</label>
    <input pInputText [(ngModel)]="filterName" placeholder="Search by name" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Email</label>
    <input pInputText [(ngModel)]="filterEmail" placeholder="Search by email" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Role</label>
    <p-dropdown [options]="roleOptions" [(ngModel)]="filterRole" placeholder="All" [showClear]="true" styleClass="w-full"></p-dropdown>
  </div>
  <div class="filter-actions">
    <p-button label="Apply" icon="pi pi-check" size="small" (onClick)="applyFilters()"></p-button>
    <p-button label="Clear" icon="pi pi-times" size="small" [outlined]="true" (onClick)="clearFilters()"></p-button>
  </div>
</p-sidebar>

<div class="page-header">
  <h2>User Management</h2>
  <div class="header-actions">
    <p-button icon="pi pi-download" label="Export" [outlined]="true" size="small" (onClick)="exportCSV()"></p-button>
    <p-button icon="pi pi-user-plus" label="Create User" size="small" (onClick)="openForm()"></p-button>
  </div>
</div>

<div class="table-card">
  <p-table #dt [value]="users" [loading]="loading" [paginator]="true" [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25, 50]"
    [globalFilterFields]="['name', 'email', 'phone', 'roleName']"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    dataKey="userId" [rowHover]="true" styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </span>
          <p-button icon="pi pi-filter" [outlined]="true" size="small" [badge]="activeFilterCount > 0 ? '' + activeFilterCount : undefined" badgeClass="p-badge-danger" pTooltip="Filters" (onClick)="filterVisible = true"></p-button>
        </div>
        <span class="record-count">{{ users.length }} users</span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="userId" style="width: 60px">ID <p-sortIcon field="userId"></p-sortIcon></th>
        <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="email">Email <p-sortIcon field="email"></p-sortIcon></th>
        <th>Phone</th>
        <th pSortableColumn="roleName">Role <p-sortIcon field="roleName"></p-sortIcon></th>
        <th pSortableColumn="isActive" style="width: 80px">Status <p-sortIcon field="isActive"></p-sortIcon></th>
        <th pSortableColumn="createdAt">Created <p-sortIcon field="createdAt"></p-sortIcon></th>
        <th style="width: 80px">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-u>
      <tr>
        <td>{{ u.userId }}</td>
        <td class="font-semibold">{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.phone }}</td>
        <td><p-tag [value]="u.roleName" severity="info"></p-tag></td>
        <td><p-tag [value]="u.isActive ? 'Active' : 'Inactive'" [severity]="u.isActive ? 'success' : 'danger'"></p-tag></td>
        <td>{{ u.createdAt | date:'short' }}</td>
        <td>
          <div class="action-btns">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" size="small" pTooltip="Edit" (onClick)="openForm(u)"></p-button>
            <p-button [icon]="u.isActive ? 'pi pi-ban' : 'pi pi-check-circle'" [rounded]="true" [text]="true" size="small"
                      [severity]="u.isActive ? 'danger' : 'success'" [pTooltip]="u.isActive ? 'Deactivate' : 'Activate'" (onClick)="toggleActive(u)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="8" class="text-center p-4">No users found.</td></tr>
    </ng-template>
  </p-table>
</div>
