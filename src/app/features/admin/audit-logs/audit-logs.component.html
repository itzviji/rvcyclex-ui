<p-sidebar [(visible)]="filterVisible" position="right" [style]="{width: '320px'}" header="Filter Audit Logs">
  <div class="filter-group">
    <label class="filter-label">Entity Type</label>
    <input pInputText [(ngModel)]="filterEntity" placeholder="e.g. Patient, Claim" class="w-full" />
  </div>
  <div class="filter-group">
    <label class="filter-label">Action</label>
    <p-dropdown [options]="actionOptions" [(ngModel)]="filterAction" placeholder="All" [showClear]="true" styleClass="w-full"></p-dropdown>
  </div>
  <div class="filter-actions">
    <p-button label="Apply" icon="pi pi-check" size="small" (onClick)="applyFilters()"></p-button>
    <p-button label="Clear" icon="pi pi-times" size="small" [outlined]="true" (onClick)="clearFilters()"></p-button>
  </div>
</p-sidebar>

<div class="page-header">
  <h2>Audit Logs</h2>
  <div class="header-actions">
    <p-button icon="pi pi-download" label="Export" [outlined]="true" size="small" (onClick)="exportCSV()"></p-button>
  </div>
</div>

<div class="table-card">
  <p-table #dt [value]="logs" [loading]="loading" [paginator]="true" [rows]="20"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    [globalFilterFields]="['entityType', 'actionType']"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    dataKey="auditId" [rowHover]="true" styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
          </span>
          <p-button icon="pi pi-filter" [outlined]="true" size="small" [badge]="activeFilterCount > 0 ? '' + activeFilterCount : undefined" badgeClass="p-badge-danger" pTooltip="Filters" (onClick)="filterVisible = true"></p-button>
        </div>
        <span class="record-count">{{ logs.length }} entries</span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="auditId" style="width: 70px">ID <p-sortIcon field="auditId"></p-sortIcon></th>
        <th pSortableColumn="userId" style="width: 90px">User ID <p-sortIcon field="userId"></p-sortIcon></th>
        <th pSortableColumn="entityType">Entity Type <p-sortIcon field="entityType"></p-sortIcon></th>
        <th pSortableColumn="entityId" style="width: 90px">Entity ID <p-sortIcon field="entityId"></p-sortIcon></th>
        <th pSortableColumn="actionType">Action <p-sortIcon field="actionType"></p-sortIcon></th>
        <th pSortableColumn="createdAt">Timestamp <p-sortIcon field="createdAt"></p-sortIcon></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-l>
      <tr>
        <td>{{ l.auditId }}</td>
        <td>{{ l.userId }}</td>
        <td class="font-semibold">{{ l.entityType }}</td>
        <td>{{ l.entityId }}</td>
        <td><p-tag [value]="l.actionType" [severity]="getActionSeverity(l.actionType)"></p-tag></td>
        <td>{{ l.createdAt | date:'medium' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="text-center p-4">No audit logs found.</td></tr>
    </ng-template>
  </p-table>
</div>
